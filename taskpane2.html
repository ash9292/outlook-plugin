<!DOCTYPE html>
<html>
<head>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>

<body>

<h2>Email Plugin</h2>

<button onclick="openExternalUrl()">Send Email Data</button>

<div id="linkContainer"></div>

<script>

Office.onReady(() => {
    console.log("Office ready");
});

function openExternalUrl() {

    let item = Office.context.mailbox.item;

    item.subject.getAsync(function(subjectResult) {

        let subject = subjectResult.value || "";

        item.to.getAsync(function(toResult) {

            let toAddresses = "";

            if (toResult.value) {
                toAddresses = toResult.value
                    .map(r => r.emailAddress)
                    .join(",");
            }

            item.body.getAsync(
                Office.CoercionType.Text,
                function(bodyResult) {

                    let body = bodyResult.value || "";

                    let apiUrl =
                        "https://ash9292.github.io/outlook-plugin/test.html"
                        + "?subject=" + encodeURIComponent(subject)
                        + "&to=" + encodeURIComponent(toAddresses)
                        + "&body=" + encodeURIComponent(body);

                    let linkHtml = `
                        <a href="${apiUrl}"
                           target="_blank"
                           style="
                                background-color:#0078d4;
                                color:white;
                                padding:12px 20px;
                                text-decoration:none;
                                border-radius:6px;
                                display:inline-block;
                           ">
                           Open External Page
                        </a>
                    `;

                    document.getElementById("linkContainer").innerHTML = linkHtml;

                }
            );

        });

    });

}

</script>

</body>
</html>
