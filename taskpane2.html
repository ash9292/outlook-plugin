<!DOCTYPE html>
<html>
<head>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>

<body>

<h2>Email Plugin</h2>

<button id="sendBtn">Send Email Data</button>

<a id="redirectLink" target="_blank" style="display:none;"></a>

<script>

Office.onReady(() => {
    console.log("Office ready");

    document.getElementById("sendBtn").addEventListener("click", openExternalUrl);
});

function openExternalUrl() {

    let item = Office.context.mailbox.item;

    if (!item) {
        alert("Email item not available");
        return;
    }

    item.subject.getAsync(function(subjectResult) {

        let subject = subjectResult.value || "";

        item.to.getAsync(function(toResult) {

            let toAddresses = "";

            if (toResult.value) {
                toAddresses = toResult.value
                    .map(r => r.emailAddress)
                    .join(",");
            }

            item.body.getAsync(
                Office.CoercionType.Text,
                function(bodyResult) {

                    let body = bodyResult.value || "";

                    let url =
                        "https://ash9292.github.io/outlook-plugin/test.html"
                        + "?subject=" + encodeURIComponent(subject)
                        + "&to=" + encodeURIComponent(toAddresses)
                        + "&body=" + encodeURIComponent(body);

                    console.log("Redirect URL:", url);

                    let link = document.getElementById("redirectLink");
                    link.href = url;
                    link.click();   // ✅ trigger redirect

                }
            );

        });

    });

}

</script>

</body>
</html>
