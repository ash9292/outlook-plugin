<!DOCTYPE html>
<html>
<head>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>

<body>

<h2>Email Plugin</h2>

<button onclick="openExternalUrl()">Send Email Data</button>

<script>

Office.onReady(() => {
    console.log("Office ready");
});

function openExternalUrl() {

    let item = Office.context.mailbox.item;

    let subject = "";
    let toAddresses = "";

    // SUBJECT
    if (item.subject && typeof item.subject === "string") {
        subject = item.subject;
        getRecipients();
    } else {
        item.subject.getAsync(function(result) {
            subject = result.value || "";
            getRecipients();
        });
    }

    function getRecipients() {

        if (item.to && Array.isArray(item.to)) {

            toAddresses = item.to
                .map(r => r.emailAddress)
                .join(",");

            getBody();

        } else {

            item.to.getAsync(function(result) {

                toAddresses = result.value
                    .map(r => r.emailAddress)
                    .join(",");

                getBody();
            });
        }
    }

    function getBody() {

        item.body.getAsync(
            Office.CoercionType.Text,
            function(bodyResult) {

                let body = bodyResult.value || "";

                let url =
                    "https://ash9292.github.io/outlook-plugin/test.html"
                    + "?subject=" + encodeURIComponent(subject)
                    + "&to=" + encodeURIComponent(toAddresses)
                    + "&body=" + encodeURIComponent(body);

                console.log("URL:", url);

                // Redirect using link
                let link = document.createElement("a");
                link.href = url;
                link.target = "_blank";
                link.click();

            }
        );
    }
}

</script>

</body>
</html>
