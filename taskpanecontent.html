<!DOCTYPE html>
<html>
<head>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>

<body>

<h2>Email Plugin</h2>

<button onclick="addContent()">Add API Button</button>

<script>

Office.onReady(() => {
    console.log("Office ready");
});

function addContent() {

    Office.context.mailbox.item.subject.getAsync(function(subjectResult) {

        let subject = subjectResult.value;

        Office.context.mailbox.item.from.getAsync(function(fromResult) {

            let sender = fromResult.value.emailAddress;

            let apiUrl = "https://your-api.com/processEmail"
                + "?subject=" + encodeURIComponent(subject)
                + "&sender=" + encodeURIComponent(sender);

            let content = `
                <h3>Email Processing</h3>

                <p>Click button to send email to external system</p>

                <a href="${apiUrl}"
                   style="
                        background-color:#0078d4;
                        color:white;
                        padding:12px 20px;
                        text-decoration:none;
                        border-radius:6px;
                        display:inline-block;
                   ">
                   Send Email to API
                </a>
            `;

            Office.context.mailbox.item.body.setAsync(
                content,
                { coercionType: Office.CoercionType.Html },
                function(result) {

                    if (result.status === Office.AsyncResultStatus.Succeeded) {
                        console.log("Button added to email");
                    } else {
                        console.log(result.error.message);
                    }
                }
            );

        });

    });

}

</script>

</body>
</html>
