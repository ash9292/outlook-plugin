<!DOCTYPE html>
<html>
<head>
    <title>Email Thread Reader</title>

    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        button {
            background: #0078d4;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h2>Email Thread Reader</h2>

<button onclick="loadThread()">Open Thread Page</button>

<script>

Office.onReady(() => {
    console.log("Office Ready");
});

function loadThread() {

    let item = Office.context.mailbox.item;

    let subject = item.subject || "";
    let conversationId = item.conversationId || "";

    let toAddresses = "";
    if (item.to) {
        toAddresses = item.to.map(x => x.emailAddress).join(",");
    }

    item.body.getAsync(
        Office.CoercionType.Text,
        function(bodyResult) {

            if (bodyResult.status !== Office.AsyncResultStatus.Succeeded) {
                console.log("Body fetch failed");
                return;
            }

            let body = bodyResult.value || "";

            // Get Graph Access Token
            Office.context.auth.getAccessTokenAsync({
                allowSignInPrompt: true,
                allowConsentPrompt: true
            },
            function(result) {

                if (result.status !== Office.AsyncResultStatus.Succeeded) {
                    console.log("Token Error", result.error);
                    return;
                }

                let token = result.value;

                // Fetch Thread Emails
                fetch(
                    "https://graph.microsoft.com/v1.0/me/messages?$filter=conversationId eq '" 
                    + conversationId + "'&$select=subject,from,bodyPreview,receivedDateTime",
                    {
                        headers: {
                            "Authorization": "Bearer " + token
                        }
                    }
                )
                .then(res => res.json())
                .then(data => {

                    let threadData = JSON.stringify(data.value);

                    let url =
                        "https://ash9292.github.io/outlook-plugin/threadviewer.html"
                        + "?subject=" + encodeURIComponent(subject)
                        + "&to=" + encodeURIComponent(toAddresses)
                        + "&body=" + encodeURIComponent(body)
                        + "&conversationId=" + encodeURIComponent(conversationId)
                        + "&thread=" + encodeURIComponent(threadData);

                    console.log("URL:", url);

                    let link = document.createElement("a");
                    link.href = url;
                    link.target = "_blank";
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);

                });

            });

        }
    );
}

</script>

</body>
</html>
