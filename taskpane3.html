<!DOCTYPE html>
<html>
<head>
    <title>Email Thread Reader</title>

    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        button {
            background: #0078d4;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #005fa3;
        }
    </style>
</head>

<body>

<h2>Email Thread Reader</h2>

<button onclick="loadThread()">Open Thread Page</button>

<script>

Office.onReady(() => {
    console.log("Office Ready");
});

function loadThread() {

    let item = Office.context.mailbox.item;

    if (!item) {
        alert("No email selected");
        return;
    }

    let subject = item.subject || "";
    let conversationId = item.conversationId || "";
    let internetMessageId = item.internetMessageId || "";

    let toAddresses = "";
    if (item.to) {
        toAddresses = item.to.map(x => x.emailAddress).join(",");
    }

    let fromAddress = item.from ? item.from.emailAddress : "";

    let ccAddresses = "";
    if (item.cc) {
        ccAddresses = item.cc.map(x => x.emailAddress).join(",");
    }

    item.body.getAsync(
        Office.CoercionType.Text,
        function(result) {

            if (result.status !== Office.AsyncResultStatus.Succeeded) {
                alert("Body fetch failed");
                return;
            }

            let body = result.value || "";

            let url =
                "https://ash9292.github.io/outlook-plugin/threadViewer.html"
                + "?subject=" + encodeURIComponent(subject)
                + "&from=" + encodeURIComponent(fromAddress)
                + "&to=" + encodeURIComponent(toAddresses)
                + "&cc=" + encodeURIComponent(ccAddresses)
                + "&body=" + encodeURIComponent(body)
                + "&conversationId=" + encodeURIComponent(conversationId)
                + "&messageId=" + encodeURIComponent(internetMessageId);

            console.log("Redirect URL:", url);

            window.open(url, "_blank");
        }
    );
}

</script>

</body>
</html>
