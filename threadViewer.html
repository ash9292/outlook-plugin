<!DOCTYPE html>
<html>
<head>
    <title>Thread Viewer</title>
</head>

<body>

<h2>Email Details</h2>

<div id="data"></div>

<script>

function getParam(name) {
    let url = new URL(window.location.href);
    return url.searchParams.get(name);
}

document.getElementById("data").innerHTML = `
<b>Subject:</b> ${getParam("subject")} <br><br>
<b>From:</b> ${getParam("from")} <br><br>
<b>To:</b> ${getParam("to")} <br><br>
<b>CC:</b> ${getParam("cc")} <br><br>
<b>Conversation ID:</b> ${getParam("conversationId")} <br><br>
<b>Message ID:</b> ${getParam("internetMessageId")} <br><br>
<b>Body:</b><br><pre>${getParam("body")}</pre>
`;

</script>

</body>
</html>
