<!DOCTYPE html>
<html>
<head>
    <title>Thread Viewer</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        .box {
            margin-bottom: 15px;
        }

        pre {
            background: #f4f4f4;
            padding: 10px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

<h2>Email Details</h2>

<div id="data"></div>

<script>

function getParam(name) {
    let url = new URL(window.location.href);
    return url.searchParams.get(name) || "";
}

document.getElementById("data").innerHTML = `
<div class="box"><b>Subject:</b> ${getParam("subject")}</div>
<div class="box"><b>From:</b> ${getParam("from")}</div>
<div class="box"><b>To:</b> ${getParam("to")}</div>
<div class="box"><b>CC:</b> ${getParam("cc")}</div>
<div class="box"><b>Conversation ID:</b> ${getParam("conversationId")}</div>
<div class="box"><b>Message ID:</b> ${getParam("messageId")}</div>
<div class="box"><b>Body:</b><pre>${getParam("body")}</pre></div>
`;

</script>

</body>
</html>
